<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Кастом алёрт</title>
</head>
<body>
    <div class="alert_box">
        <div class="alert_item">
            <p class="alert_h">Заголовок</p>
            <p class="alert_desc">Небольшое описание</p>
        </div>
        <button class="alert_btn">&#10006;</button>
    </div>
    <main>
        <div class="container">
            <button class="btn danger">Ошибка</button>
            <button class="btn warning">Предупреждение</button>
            <button class="btn success">Успех</button>
            <button class="btn info">Информация</button>
        </div>
        
    </main>
    <script src="js/srctipt.js"></script>
</body>
</html>
